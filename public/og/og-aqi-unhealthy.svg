<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg1" cx="20%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#FF0000"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg2" cx="80%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg3" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg4" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" result="grayNoise"/>
      <feBlend in="grayNoise" in2="SourceGraphic" mode="overlay" result="blend"/>
    </filter>
    
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="100"/>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="#1a1d21"/>
  <ellipse cx="0" cy="630" rx="800" ry="600" fill="url(#bg1)" filter="url(#blur)" opacity="0.85"/>
  <ellipse cx="1200" cy="0" rx="750" ry="550" fill="url(#bg2)" filter="url(#blur)" opacity="0.8"/>
  <ellipse cx="600" cy="315" rx="700" ry="500" fill="url(#bg3)" filter="url(#blur)" opacity="0.75"/>
  <ellipse cx="300" cy="100" rx="600" ry="450" fill="url(#bg4)" filter="url(#blur)" opacity="0.7"/>
  <rect width="1200" height="630" fill="transparent" filter="url(#grain)" opacity="0.35"/>
  
  <text x="600" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="700" fill="rgba(255,255,255,0.98)" text-anchor="middle" letter-spacing="-0.02em">Unhealthy</text>
  <text x="600" y="365" font-family="system-ui, sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="0.03em">Sraphangthong pond, Sakon Nakhon</text>
</svg>