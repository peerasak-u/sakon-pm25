<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-good" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1f0a"/>
      <stop offset="100%" stop-color="#001a00"/>
    </linearGradient>
    <radialGradient id="glow-good" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(0,228,0,0.3)"/>
      <stop offset="60%" stop-color="rgba(0,228,0,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-good)"/>
  <rect width="1200" height="630" fill="url(#glow-good)"/>
  
  <!-- Header bar -->
  <rect x="60" y="60" width="1080" height="4" fill="#00E400" opacity="0.6"/>
  
  <!-- Station name -->
  <text x="600" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.9">สวนสมเด็จพระศรีนครินทร์</text>
  <text x="600" y="210" font-family="system-ui, -apple-serif, sans-serif" font-size="32" font-weight="400" fill="#00E400" text-anchor="middle" letter-spacing="2">Srisanakarin Park</text>
  
  <!-- Location badge -->
  <rect x="520" y="240" width="160" height="36" rx="18" fill="rgba(0,228,0,0.15)" stroke="#00E400" stroke-width="1"/>
  <text x="600" y="265" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="#00E400" text-anchor="middle">สกลนคร · Sakon Nakhon</text>
  
  <!-- AQI Level - Main display -->
  <text x="600" y="400" font-family="system-ui, sans-serif" font-size="120" font-weight="700" fill="#00E400" text-anchor="middle">ดีมาก</text>
  <text x="600" y="470" font-family="system-ui, sans-serif" font-size="48" font-weight="300" fill="#ffffff" text-anchor="middle" opacity="0.8">Good</text>
  
  <!-- CTA -->
  <text x="600" y="540" font-family="system-ui, sans-serif" font-size="24" font-weight="400" fill="#ffffff" text-anchor="middle" opacity="0.7">ออกไปวิ่งที่สวนได้เลย · Perfect for jogging</text>
  
  <!-- Bottom accent -->
  <rect x="60" y="580" width="1080" height="2" fill="#00E400" opacity="0.4"/>
</svg>